<!DOCTYPE html>
<html>
  <nav>
    <img
      src="{{ url_for('static', filename='help_logo.png') }}"
      alt="Support4U"
    />
    <a id="leftNav" href="/">Support4U</a>
    {% if current_user.username %}
      <a data-testid="logout_button" id="rightNav" onclick="return confirm('Are you sure you want to logout?')" href="/logout">Logout</a>
      
      {% if current_user.account_type_admin %}
        <a data-testid="promote_user_button" id="rightNav" href="/users">Promote User</a>
      {% endif %}
      
      <a data-testid="new_ticket_button" id="rightNav" href="/submit-ticket">New Ticket</a>
      <a data-testid="dashboard_button" id="rightNav" href="/">Dashboard</a>
      
    {% else %}
      <a data-testid="login_button" id="rightNav" href="/">Login</a>
    {% endif %}
  </nav>
</html>
