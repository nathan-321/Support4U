<!DOCTYPE html>
<html>
  <h2>All Tickets</h2>
  <table>
    {% if current_user.account_type_admin %}
    <tr>
      <th>Ticket</th>
      <th>Priority</th>
      <th>Created at</th>
      <th>Status</th>
      <th>Ticket Creator</th>
      <th>Edit</th>
      <th>Delete</th>
    </tr>
    {% for ticket in tickets %}
    <tr>
      <td>{{ ticket.title }}</td>
      <td>{{ ticket.priority }}</td>
      <td>{{ ticket.date_time_created }}</td>
      <td>{{ ticket.status }}</td>
      <td>{{ ticket.ticket_creator.username }}</td>
      <td>
        <a
          href="{{ url_for('tickets.edit_ticket', ticket_id=ticket.ticket_id) }}"
        >
          <button id="tableButtons">Edit</button>
        </a>
      </td>
      <td>
        <form
          method="POST"
          action="{{ url_for('tickets.delete_ticket', ticket_id=ticket.ticket_id) }}"
        >
          <button
            id="tableButtons"
            type="submit"
            onclick="return confirm('Are you sure you want to delete this ticket?')"
          >
            Delete
          </button>
        </form>
      </td>
    </tr>
    {% endfor %}{% endif %}
  </table>
</html>
