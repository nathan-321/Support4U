<!DOCTYPE html>
<html>
  {% extends 'layout.html' %} {% block content %}
  <h2>Submit a Ticket</h2>
  <form method="POST" action="/submit-ticket">
    <label for="description">Title: </label>
    <input data-testid="ticket_title" name="title" placeholder="Title" required /><br />
    <label for="description">Description: </label>
    <textarea data-testid="ticket_description" name="description" placeholder="Describe your issue"></textarea>
    <label for="priority">Priority: </label>
    <input
      data-testid="ticket_priority"
      name="priority"
      type="number"
      placeholder="Priority (between 1 and 5)"
      min="1"
      max="5"
      required
    /><br />

    <label for="status">Status: </label>
    <select data-testid="ticket_status" name="status">
      <option value="Open">Open</option>
      <option value="In Progress">In Progress</option>
      <option value="Resolved">Resolved</option>
      <option value="Closed">Closed</option></select
    ><br />
    <button data-testid="new_ticket_submit" type="submit">Submit Ticket</button>
  </form>
  {% endblock %}
</html>
