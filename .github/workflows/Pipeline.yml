name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Linting Python with Ruff
        run: pip install ruff && ruff check .

  pytest_and_cypress_tests:
    runs-on: ubuntu-latest
    needs: linting

    env:
      TESTING_DATABASE: sqlite:///:memory
      SECRET_KEY: 123456
      PROD_DATABASE: sqlite:///support4u.db
      CYPRESS_TESTING: True

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest and fail if test coverage below 80%
        run: |
          coverage run -m pytest
          coverage report --fail-under=80 --omit="tests/*"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cypress dependencies
        run: npm ci

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: python app.py
          wait-on: http://localhost:5000

  sast_scanning:
    runs-on: ubuntu-latest
    needs: pytest_and_cypress_tests

    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit Security Scanner (SAST)
        run: pip install bandit && bandit -r . -x ./tests

  dast_scanning:
    runs-on: ubuntu-latest
    needs: sast_scanning

    steps:
      - uses: actions/checkout@v4
      - name: Run Safety Dependency Security Scanner (DAST)
        run: pip install safety && safety check
        continue-on-error: true

      - name: OWASP Dependency Security Scanner (DAST)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "support4u"
          path: "."
          format: "HTML"
        continue-on-error: true
