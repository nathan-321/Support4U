name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  linting:
    runs-on: ubuntu-latest

    env:
      TESTING_DATABASE: sqlite:///:memory
      SECRET_KEY: 123456
      PROD_DATABASE: sqlite:///support4u.db
      CYPRESS_TESTING: True

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Linting Python with Ruff
        run: ruff check .

  pytest:
    runs-on: ubuntu-latest
    needs: linting

    steps:
      - name: Run pytest and fail if test coverage below 80%
        run: |
          coverage run -m pytest
          coverage report --fail-under=80 --omit="tests/*"

  cypress_testing:
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cypress dependencies
        run: npm ci

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          start: python app.py
          wait-on: http://localhost:5000

  sast_scanning:
    runs-on: ubuntu-latest
    needs: cypress_testing

    steps:
      - name: Run Bandit Security Scanner (SAST)
        run: bandit -r . -x ./tests

  dast_scanning:
    runs-on: ubuntu-latest
    needs: sast_scanning

    steps:
      - name: Run Safety Dependency Security Scanner (DAST)
        run: safety check

      - name: OWASP Dependency Security Scanner (DAST)
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "support4u"
          path: "."
          format: "HTML"
        continue-on-error: true
